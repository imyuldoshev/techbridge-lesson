{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — Dars Jadvali</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { background-color: #f0f2f5; }
        .login-card {
            max-width: 420px;
            margin: 100px auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        .login-header {
            background: #212529;
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 28px 24px 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h4 class="mb-1">&#128197; Dars Jadvali</h4>
        <p class="mb-0 text-white-50">Tizimga kirish</p>
    </div>
    <div class="card-body p-4">
        {% if form.errors %}
            <div class="alert alert-danger">Login yoki parol noto'g'ri.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Foydalanuvchi nomi</label>
                <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Parol</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Kirish</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
